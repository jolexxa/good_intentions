name: Publish good_intentions

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - "good_intentions-v*"

permissions:
  contents: write
  id-token: write

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          latest=$(git tag -l 'good_intentions-v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="good_intentions-v0.0.0"
          fi

          version="${latest#good_intentions-v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          tag="good_intentions-v${major}.${minor}.${patch}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest} -> ${tag}"

      - name: Update pubspec version
        run: |
          version="${{ steps.bump.outputs.tag }}"
          version="${version#good_intentions-v}"
          sed -i "s/^version: .*/version: ${version}/" good_intentions/pubspec.yaml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add good_intentions/pubspec.yaml
          git commit -m "chore(good_intentions): bump to ${version}"
          git push

      - name: Create and push tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    needs: version
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag || github.ref }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Copy root README into package
        run: |
          cp README.md good_intentions/README.md
          sed -i 's|good_intentions/coverage_badge.svg|coverage_badge.svg|g' good_intentions/README.md

      - name: Install dependencies
        working-directory: good_intentions
        run: dart pub get

      - name: Publish
        working-directory: good_intentions
        run: dart pub publish --force

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, publish]
    if: always() && needs.publish.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.version.outputs.tag || github.ref_name }}"
          gh release create "$tag" --generate-notes
