name: Publish intentions_engine

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - "intentions_engine-v*"

permissions:
  contents: write
  id-token: write

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Determine next version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          latest=$(git tag -l 'intentions_engine-v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="intentions_engine-v0.0.0"
          fi

          version="${latest#intentions_engine-v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          tag="intentions_engine-v${major}.${minor}.${patch}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest} -> ${tag}"

      - name: Update pubspec version and downstream deps
        run: |
          version="${{ steps.bump.outputs.tag }}"
          version="${version#intentions_engine-v}"
          sed -i "s/^version: .*/version: ${version}/" intentions_engine/pubspec.yaml
          sed -i "s/intentions_engine: ^.*/intentions_engine: ^${version}/" good_intentions/pubspec.yaml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intentions_engine/pubspec.yaml good_intentions/pubspec.yaml
          git commit -m "chore(intentions_engine): bump to ${{ steps.bump.outputs.tag }}"
          git push

      - name: Create and push tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        working-directory: intentions_engine
        run: dart pub get

      - name: Publish
        working-directory: intentions_engine
        run: dart pub publish --force

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes
